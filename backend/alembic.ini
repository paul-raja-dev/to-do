# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate new migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path path, used to find modules.
# prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# timezone =

# max length of characters to truncate the slug to in
# filename.
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow modules to be loaded with relative paths
# use_relative_imports = false

# version locations.  specifies location of version files.
# version_locations = %(here)s/alembic/versions

# version path separator; defaults to OS line separator.
# version_path_separator = os

# logging configuration is defined in logging.config
# and specified here.
# config_file_name = %(here)s/logging.conf

# database URL
sqlalchemy.url = postgresql+asyncpg://postgres:paul%%400069@localhost:5432/paul


[post_write_hooks]

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
